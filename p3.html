<script>
function showTab(name, btn) {
    document.querySelectorAll('.tc').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    btn.classList.add('active');
}
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function ss(key, val) {
    fetch('/project/{{ project.id }}/stage', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({key: key, val: val})
    }).then(r => r.json()).then(d => {
        const btn = document.getElementById('stage-' + key);
        btn.className = 'stage status-' + val;
        document.getElementById('pf').style.width = d.progress + '%';
        document.getElementById('pt2').textContent = d.progress + '%';
    });
}

function uploadF(input, cat) {
    const fd = new FormData();
    for (const f of input.files) fd.append('files', f);
    fd.append('category', cat);
    fetch('/project/{{ project.id }}/upload', {method:'POST', body:fd})
    .then(r => r.json()).then(d => {
        if (d.success) {
            d.docs.forEach(doc => {
                const div = document.createElement('div');
                div.className = 'fi';
                div.id = 'doc-' + doc.id;
                div.innerHTML = `<div style="display:flex;align-items:center;gap:10px">
                    <span>${doc.file_type === 'image' ? '[IMG]' : doc.file_type === 'pdf' ? '[PDF]' : '[FILE]'}</span>
                    <div><a href="/uploads/{{ project.id }}/${doc.filename}" target="_blank" style="color:#8b6914;font-size:14px">${doc.original_name}</a>
                    <div style="font-size:11px;color:#aaa">${(doc.file_size/1024).toFixed(1)} KB</div></div>
                </div>
                <button class="btn btn-sm btn-danger" onclick="delDoc(${doc.id})">Del</button>`;
                document.getElementById('fl-' + cat).appendChild(div);
            });
        }
    });
}

function delDoc(id) {
    if (!confirm('Удалить файл?')) return;
    fetch('/doc/' + id + '/delete', {method:'POST'})
    .then(r => r.json()).then(d => {
        if (d.success) document.getElementById('doc-' + id).remove();
    });
}

function addRoom() {
    const name = document.getElementById('rni').value.trim();
    if (!name) return;
    fetch('/project/{{ project.id }}/room/add', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({name: name})
    }).then(r => r.json()).then(d => {
        if (d.success) { closeModal('modal-room'); location.reload(); }
    });
}

function delRoom(id) {
    if (!confirm('Удалить комнату и все фото?')) return;
    fetch('/room/' + id + '/delete', {method:'POST'})
    .then(r => r.json()).then(d => {
        if (d.success) document.getElementById('room-' + id).remove();
    });
}

function uploadRoom(input, roomId) {
    const fd = new FormData();
    for (const f of input.files) fd.append('files', f);
    fetch('/room/' + roomId + '/upload', {method:'POST', body:fd})
    .then(r => r.json()).then(d => {
        if (d.success) {
            d.images.forEach(img => {
                const el = document.createElement('img');
                el.src = '/uploads/{{ project.id }}/' + img.filename;
                el.onclick = () => lightbox(el.src);
                document.getElementById('ri-' + roomId).appendChild(el);
            });
        }
    });
}

function lightbox(src) {
    document.getElementById('lb-img').src = src;
    openModal('lightbox-m');
}

function getClientLink() {
    fetch('/project/{{ project.id }}/client-link')
    .then(r => r.json()).then(d => {
        document.getElementById('cl-url').textContent = d.url;
        openModal('modal-link');
    });
}

function copyL() {
    const txt = document.getElementById('cl-url').textContent;
    navigator.clipboard.writeText(txt).then(() => alert('Ссылка скопирована!'));
}

function openAddSpec() {
    document.getElementById('spec-title').textContent = 'Добавить позицию';
    document.getElementById('spec-id').value = '';
    document.getElementById('s-room').value = '';
    document.getElementById('s-cat').value = '';
    document.getElementById('s-name').value = '';
    document.getElementById('s-art').value = '';
    document.getElementById('s-sup').value = '';
    document.getElementById('s-qty').value = 1;
    document.getElementById('s-unit').value = 'шт';
    document.getElementById('s-price').value = 0;
    document.getElementById('s-comm').value = '';
    document.getElementById('s-status').value = 'не заказано';
    openModal('modal-spec');
}

function editSpec(id, room, cat, name, art, sup, qty, unit, price, comm, status) {
    document.getElementById('spec-title').textContent = 'Редактировать позицию';
    document.getElementById('spec-id').value = id;
    document.getElementById('s-room').value = room;
    document.getElementById('s-cat').value = cat;
    document.getElementById('s-name').value = name;
    document.getElementById('s-art').value = art;
    document.getElementById('s-sup').value = sup;
    document.getElementById('s-qty').value = qty;
    document.getElementById('s-unit').value = unit;
    document.getElementById('s-price').value = price;
    document.getElementById('s-comm').value = comm;
    document.getElementById('s-status').value = status;
    openModal('modal-spec');
}

function saveSpec() {
    const id = document.getElementById('spec-id').value;
    const data = {
        room_name: document.getElementById('s-room').value,
        category: document.getElementById('s-cat').value,
        item_name: document.getElementById('s-name').value,
        article: document.getElementById('s-art').value,
        supplier: document.getElementById('s-sup').value,
        quantity: parseFloat(document.getElementById('s-qty').value),
        unit: document.getElementById('s-unit').value,
        price: parseFloat(document.getElementById('s-price').value),
        comment: document.getElementById('s-comm').value,
        status: document.getElementById('s-status').value
    };
    const url = id ? '/spec/' + id + '/edit' : '/project/{{ project.id }}/spec/add';
    fetch(url, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(data)
    }).then(r => r.json()).then(d => {
        if (d.success) { closeModal('modal-spec'); location.reload(); }
    });
}

function delSpec(id) {
    if (!confirm('Удалить позицию?')) return;
    fetch('/spec/' + id + '/delete', {method:'POST'})
    .then(r => r.json()).then(d => {
        if (d.success) {
            document.getElementById('sr-' + id).remove();
        }
    });
}
</script>
</body>
</html>
