<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Новый проект — YOMKO</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8f6f3;min-height:100vh}
nav{background:#fff;padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 8px rgba(0,0,0,0.06)}
.nav-logo{font-size:20px;font-weight:800;color:#2c2c2c;letter-spacing:3px}
.nav-logo span{font-size:11px;color:#c4a35a;letter-spacing:2px;display:block;font-weight:400;text-transform:uppercase}
.btn{padding:9px 20px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none;text-decoration:none;display:inline-block}
.btn-gold{background:#c4a35a;color:#fff}
.btn-gold:hover{background:#b8923d}
.btn-outline{background:#fff;color:#555;border:1.5px solid #e5e7eb}
.container{max-width:700px;margin:0 auto;padding:32px 24px}
.back{display:inline-flex;align-items:center;gap:6px;color:#888;font-size:14px;text-decoration:none;margin-bottom:24px}
.back:hover{color:#c4a35a}
h1{font-size:24px;color:#2c2c2c;font-weight:700;margin-bottom:28px}
.card{background:#fff;border-radius:14px;padding:32px;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.section-title{font-size:13px;font-weight:600;color:#c4a35a;text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid #f3f4f6}
.fg{margin-bottom:18px}
label{display:block;font-size:13px;color:#555;margin-bottom:6px;font-weight:500}
input,textarea,select{width:100%;padding:11px 14px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:15px;outline:none;transition:border-color .2s;font-family:inherit}
input:focus,textarea:focus{border-color:#c4a35a}
textarea{resize:vertical}
.row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.actions{display:flex;gap:12px;margin-top:24px}
</style>
</head>
<body>
<nav>
  <div class="nav-logo">YOMKO<span>Студия дизайна интерьеров</span></div>
  <a href="/dashboard" class="btn btn-outline">← Назад</a>
</nav>
<div class="container">
  <h1>Новый проект</h1>
  <div class="card">
    <form method="POST">
      <div class="section-title">Информация о проекте</div>
      <div class="fg"><label>Название проекта *</label><input name="title" placeholder="Квартира на Арбате" required autofocus></div>
      <div class="section-title" style="margin-top:24px">Клиент</div>
      <div class="row">
        <div class="fg"><label>Имя клиента *</label><input name="client_name" placeholder="Иван Петров" required></div>
        <div class="fg"><label>Телефон</label><input name="client_phone" placeholder="+7 900 000-00-00"></div>
      </div>
      <div class="row">
        <div class="fg"><label>Email</label><input type="email" name="client_email" placeholder="client@email.com"></div>
        <div class="fg"><label>Адрес объекта</label><input name="address" placeholder="ул. Пушкина, д.1"></div>
      </div>
      <div class="section-title" style="margin-top:24px">Сроки</div>
      <div class="row">
        <div class="fg"><label>Дата начала</label><input type="date" name="start_date"></div>
        <div class="fg"><label>Дата сдачи</label><input type="date" name="end_date"></div>
      </div>
      <div class="section-title" style="margin-top:24px">Описание</div>
      <div class="fg"><label>Описание проекта</label><textarea name="description" rows="4" placeholder="Краткое описание..."></textarea></div>
      <div class="actions">
        <button type="submit" class="btn btn-gold">Создать проект</button>
        <a href="/dashboard" class="btn btn-outline">Отмена</a>
      </div>
    </form>
  </div>
</div>
</body>
</html>
