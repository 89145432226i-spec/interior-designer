<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Регистрация — YOMKO</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8f6f3;display:flex;align-items:center;justify-content:center;min-height:100vh}
.box{background:#fff;border-radius:16px;padding:40px;width:100%;max-width:420px;box-shadow:0 4px 24px rgba(0,0,0,0.08)}
.logo{text-align:center;margin-bottom:6px}
.logo-title{font-size:28px;font-weight:800;color:#2c2c2c;letter-spacing:3px}
.logo-sub{font-size:11px;color:#c4a35a;letter-spacing:2px;text-transform:uppercase;text-align:center;margin-bottom:28px}
label{display:block;font-size:13px;color:#555;margin-bottom:6px;font-weight:500}
input{width:100%;padding:12px 14px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:15px;outline:none;transition:border-color .2s;margin-bottom:18px}
input:focus{border-color:#c4a35a}
.btn{width:100%;padding:13px;background:#c4a35a;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer}
.btn:hover{background:#b8923d}
.link{text-align:center;margin-top:20px;font-size:14px;color:#888}
.link a{color:#c4a35a;text-decoration:none;font-weight:500}
.flash{background:#fee2e2;color:#dc2626;padding:12px;border-radius:10px;margin-bottom:16px;font-size:14px;text-align:center}
</style>
</head>
<body>
<div class="box">
  <div class="logo"><span class="logo-title">YOMKO</span></div>
  <div class="logo-sub">Студия дизайна интерьеров</div>
  {% with messages = get_flashed_messages() %}
    {% if messages %}{% for m in messages %}<div class="flash">{{ m }}</div>{% endfor %}{% endif %}
  {% endwith %}
  <form method="POST">
    <label>Имя и фамилия</label>
    <input name="full_name" placeholder="Анна Иванова" required autofocus>
    <label>Логин</label>
    <input name="username" placeholder="Придумайте логин" required>
    <label>Email</label>
    <input type="email" name="email" placeholder="email@example.com" required>
    <label>Пароль</label>
    <input type="password" name="password" placeholder="Минимум 6 символов" required>
    <button type="submit" class="btn">Создать аккаунт</button>
  </form>
  <div class="link">Уже есть аккаунт? <a href="/login">Войти</a></div>
</div>
</body>
</html>
